<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My List</title>
<!-- Google tag (gtag.js) -->

<script defer src="https://cloud.umami.is/script.js" data-website-id="353ff1bc-d3a2-4a66-be17-85ebae77d09b"></script>
<script>
  /* fires the same custom event to both GA4 and Umami; no-ops silently for
     whichever one didn't load (ad blockers routinely catch one but not the
     other, which is the whole point of running both) */
  function trackEvent(name, params){

  /* apply saved theme before first paint to avoid a flash */
  document.documentElement.setAttribute("data-theme", localStorage.getItem("theme") || "dark");
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#14160F; --ink:#EEEBDD;
    --olive:#93B255; --olive-deep:#B8D678; --brass:#E0B85B;
    --card:#1D2016; --line:#33362A; --red:#E2795F;
    --radius:14px; --shadow:0 2px 14px rgba(0,0,0,.35);
    font-size:16px;
  }
  :root[data-theme="light"]{
    --bg:#F7F4EC; --ink:#22251B;
    --olive:#5A6B2F; --olive-deep:#3E4A1F; --brass:#B08D3E;
    --card:#FFFFFF; --line:#E3DECF; --red:#B4462F;
    --shadow:0 2px 14px rgba(34,37,27,.07);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:
      radial-gradient(1100px 500px at 12% -10%, color-mix(in srgb, var(--olive) 10%, transparent), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, color-mix(in srgb, var(--brass) 7%, transparent), transparent 55%),
      var(--bg);
    color:var(--ink);font-family:'Manrope','IBM Plex Sans Arabic',sans-serif;line-height:1.6}
  h1,h2,h3{font-family:inherit;font-weight:800}
  ::selection{background:var(--olive);color:#12140D}
  ::-webkit-scrollbar{width:11px;height:11px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:999px;border:3px solid var(--bg)}
  ::-webkit-scrollbar-thumb:hover{background:var(--olive)}

  .shell{display:grid;grid-template-columns:272px 1fr;min-height:100vh}

  /* ---------- sidebar ---------- */
  .sidebar{background:var(--card);border-inline-end:1px solid var(--line);padding:1.5rem 1.3rem;display:flex;flex-direction:column;gap:1.5rem;position:sticky;top:0;height:100vh;overflow-y:auto}
  .wordmark{display:block;text-decoration:none;cursor:pointer;transition:opacity .15s;display:flex;flex-direction:column;gap:.15rem}
  .wordmark:hover{opacity:.85}
  .wordmark:focus-visible{outline:3px solid var(--brass);outline-offset:4px;border-radius:6px}
  .wordmark h1{font-size:1.5rem;line-height:1.05;letter-spacing:.005em;background:linear-gradient(100deg, var(--ink) 40%, var(--olive-deep));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .wordmark small{color:var(--olive);font-size:.74rem;letter-spacing:.02em}

  .filter-section{border-top:1px solid var(--line);padding-top:1.05rem}
  .filter-section:first-of-type{border-top:none;padding-top:0}
  .filter-section summary{display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:.78rem;letter-spacing:.07em;text-transform:uppercase;color:var(--ink);cursor:pointer;list-style:none}
  .filter-section summary::-webkit-details-marker{display:none}
  .filter-section summary::after{content:"+";color:var(--olive);font-size:1.15rem;font-weight:400;line-height:1}
  .filter-section[open] summary::after{content:"–"}
  .filter-list{display:flex;flex-direction:column;gap:.1rem;margin-top:.7rem;max-height:230px;overflow-y:auto}
  .stock-toggle{display:flex;align-items:center;gap:.55rem;font-size:.85rem;font-weight:600;color:var(--ink);cursor:pointer;user-select:none}
  .stock-toggle input{width:16px;height:16px;accent-color:var(--olive);cursor:pointer;flex:none}
  .filter-row{display:flex;align-items:center;justify-content:space-between;gap:.6rem;padding:.42rem .35rem;font-size:.85rem;font-weight:500;color:var(--ink);cursor:pointer;border-radius:6px;background:none;border:none;font-family:inherit;width:100%;text-align:start}
  .filter-row:hover{color:var(--olive-deep)}
  .filter-row[aria-pressed="true"]{color:var(--olive-deep);font-weight:700}
  .filter-row-label{display:flex;align-items:center;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .filter-row .count{font-size:.72rem;color:var(--ink);opacity:.45;font-variant-numeric:tabular-nums;flex-shrink:0}
  .filter-row .swatch{width:9px;height:9px;border-radius:50%;border:1.5px solid var(--olive);margin-inline-end:.55rem;flex-shrink:0}
  .filter-row[aria-pressed="true"] .swatch{background:var(--olive)}

  .select-clearable{position:relative;margin-top:.7rem}
  .store-select{width:100%;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);border-radius:999px;padding:.5rem 1rem;font-family:inherit;font-size:.85rem;cursor:pointer;transition:border-color .15s}
  .store-select:hover{border-color:var(--olive)}
  .store-select:focus-visible{outline:3px solid var(--brass);outline-offset:2px}
  .select-clearable:has(.select-clear:not([hidden])) .store-select{padding-inline-end:2.1rem}
  .select-clear{position:absolute;top:50%;inset-inline-end:.55rem;transform:translateY(-50%);background:none;border:none;color:var(--red);font-size:1.05rem;line-height:1;cursor:pointer;padding:.15rem;border-radius:50%}
  .select-clear:hover{background:color-mix(in srgb, var(--red) 15%, transparent)}
  .select-clear:focus-visible{outline:2px solid var(--brass);outline-offset:1px}

  .view-toggle{display:flex;gap:2px;background:var(--bg);border:1.5px solid var(--line);border-radius:999px;padding:3px;margin-top:.7rem}
  .view-btn{flex:1;border:none;background:transparent;color:var(--ink);cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:700;padding:.4rem .5rem;border-radius:999px;transition:background .15s,color .15s;line-height:1}
  .view-btn:hover{color:var(--olive-deep)}
  .view-btn[aria-pressed="true"]{background:var(--olive);color:#12140D}
  .view-btn:focus-visible{outline:3px solid var(--brass);outline-offset:1px}

  .sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
  .sidebar-overlay.open{opacity:1;pointer-events:auto}
  @media (max-width:860px){
    .shell{grid-template-columns:minmax(0,1fr)}
    .sidebar{position:fixed;top:0;bottom:0;inset-inline-start:0;width:min(320px,86vw);height:auto;z-index:70;
      transform:translateX(-100%);transition:transform .25s ease;box-shadow:8px 0 30px rgba(0,0,0,.3)}
    [dir="rtl"] .sidebar{transform:translateX(100%)}
    .sidebar.open{transform:translateX(0)}
  }

  /* ---------- topbar (main column) ---------- */
  .topbar{display:flex;align-items:center;gap:.7rem;padding:1rem 1.3rem;border-bottom:1px solid var(--line);background:var(--card);position:sticky;top:0;z-index:40}
  .filters-toggle{display:none;align-items:center;gap:.4rem;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);border-radius:999px;padding:.55rem .8rem;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;flex-shrink:0}
  .filters-toggle:hover{border-color:var(--olive)}
  .filter-badge{background:var(--brass);color:#12140D;border-radius:999px;min-width:1.2rem;height:1.2rem;display:inline-flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;padding:0 .3rem}
  .filter-badge[hidden]{display:none}
  .search-wrap{position:relative;flex:1;min-width:160px;max-width:420px}
  .search-icon{position:absolute;inset-inline-start:.85rem;top:50%;transform:translateY(-50%);font-size:.85rem;opacity:.6;pointer-events:none}
  .search{width:100%;box-sizing:border-box;border:1.5px solid var(--line);border-radius:999px;background:var(--bg);padding:.6rem 1rem .6rem 2.35rem;font-family:inherit;font-size:.92rem;color:var(--ink);transition:border-color .15s, box-shadow .15s}
  [dir="rtl"] .search{padding:.6rem 2.35rem .6rem 1rem}
  .search:focus{outline:none;border-color:var(--olive);box-shadow:0 0 0 3px color-mix(in srgb, var(--olive) 22%, transparent)}
  .topbar-spacer{flex:1}
  .icon-btn{background:transparent;border:1.5px solid var(--line);color:var(--ink);cursor:pointer;font-family:inherit;font-size:.85rem;font-weight:600;padding:.5rem .8rem;border-radius:999px;transition:border-color .15s ease, background .15s ease, transform .15s ease}
  .icon-btn:hover{border-color:var(--olive);transform:translateY(-1px)}
  .icon-btn[aria-pressed="true"]{background:var(--olive);border-color:var(--olive);color:#12140D}
  .cart-btn{background:linear-gradient(135deg, var(--brass), color-mix(in srgb, var(--brass) 75%, #fff));color:#1a1a12;border:none;cursor:pointer;font-family:inherit;font-size:.95rem;font-weight:700;padding:.55rem 1.1rem;border-radius:999px;display:flex;align-items:center;gap:.5rem;transition:transform .15s, box-shadow .15s;box-shadow:0 2px 10px color-mix(in srgb, var(--brass) 35%, transparent)}
  .cart-btn:hover{transform:translateY(-1px);box-shadow:0 6px 16px color-mix(in srgb, var(--brass) 45%, transparent)}
  .cart-btn:focus-visible{outline:3px solid var(--olive);outline-offset:2px}
  .cart-count{background:#1a1a12;color:var(--brass);border-radius:999px;min-width:1.4rem;height:1.4rem;display:inline-flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700}
  @media (max-width:640px){
    .filters-toggle{display:flex}
    .topbar{flex-wrap:wrap}
  }

  .disclaimer{max-width:1200px;margin:0;padding:1rem 1.3rem 0;font-size:.76rem;color:#8A8D7B;line-height:1.5}
  .site-footer{margin-top:auto;padding-top:1.05rem;border-top:1px solid var(--line);font-size:.72rem;color:#8A8D7B;line-height:1.55}
  .site-footer a{color:var(--olive-deep)}

  .grid{max-width:1200px;margin:0;padding:1rem 1.3rem 4rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.2rem}
  .grid[data-cols="1"]{grid-template-columns:1fr}
  .grid[data-cols="2"]{grid-template-columns:repeat(2,1fr)}
  .grid[data-cols="3"]{grid-template-columns:repeat(3,1fr)}
  @media (max-width:520px){ .grid[data-cols="3"]{gap:.6rem} .grid[data-cols="2"]{gap:.7rem} }
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;display:flex;flex-direction:column;outline:0 solid transparent;transition:outline-color .3s, transform .15s ease, border-color .15s ease;
    animation:card-in .35s ease backwards}
  .card:hover{transform:translateY(-3px);border-color:color-mix(in srgb, var(--olive) 45%, var(--line))}
  .card.flash{outline:3px solid var(--brass);outline-offset:2px}
  @keyframes card-in{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  @media (prefers-reduced-motion:reduce){.card{animation:none}}
  .card-img{position:relative;height:190px;display:flex;align-items:center;justify-content:center;background:linear-gradient(160deg,var(--line),var(--bg));font-size:3.4rem;overflow:hidden}
  .card-img img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;transition:transform .4s ease}
  .card:hover .card-img img{transform:scale(1.05)}
  .card-share{position:absolute;top:.55rem;inset-inline-end:.55rem;background:rgba(0,0,0,.55);color:#fff;border:none;border-radius:50%;width:2.1rem;height:2.1rem;font-size:1rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s, transform .15s;z-index:2}
  .card-share:hover{background:rgba(0,0,0,.75);transform:scale(1.08)}
  .card-share:focus-visible{outline:2px solid var(--brass);outline-offset:2px}
  .lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:2rem;opacity:0;pointer-events:none;transition:opacity .2s}
  .lightbox.open{opacity:1;pointer-events:auto}
  .lightbox img{max-width:100%;max-height:100%;border-radius:8px;box-shadow:0 10px 40px rgba(0,0,0,.5)}
  .lightbox-close{position:fixed;top:1.1rem;inset-inline-end:1.2rem;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:1.6rem;line-height:1;width:2.4rem;height:2.4rem;border-radius:50%;cursor:pointer}
  .card-body{padding:1rem 1.1rem 1.2rem;display:flex;flex-direction:column;gap:.6rem;flex:1}
  .card-body h3{font-size:1.08rem;line-height:1.35}
  .card-brand{align-self:flex-start;background:none;border:none;color:var(--olive);font-family:inherit;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;cursor:pointer;padding:0;margin-bottom:-.3rem;direction:ltr}
  .card-brand:hover{text-decoration:underline}
  .name-alt{font-size:.8rem;color:#8A8D7B;direction:ltr;text-align:start}
  .dupe-of,.duped-by{font-size:.78rem;color:var(--brass);font-weight:600}
  .dupe-of a,.duped-by a{color:var(--brass);text-decoration:underline;cursor:pointer;background:none;border:none;font:inherit;padding:0}
  .accords{display:flex;flex-direction:column;gap:3px;margin-top:.1rem}
  .accords:not(.expanded) .accord:nth-child(n+6){display:none}
  .accords-toggle{align-self:flex-start;background:none;border:none;color:var(--olive-deep);font-size:.76rem;font-weight:600;cursor:pointer;padding:0;text-decoration:underline;margin-top:-2px}
  .accord{height:1.3rem;border-radius:5px;display:flex;align-items:center;padding:0 .6rem;font-size:.7rem;font-weight:600;color:rgba(0,0,0,.68);box-shadow:inset 0 1px 0 rgba(255,255,255,.25), inset 0 -1px 2px rgba(0,0,0,.12)}
  .stores-list:not(.expanded) .store-block:nth-child(n+2){display:none}
  .stores-toggle{align-self:flex-start;background:none;border:none;color:var(--olive-deep);font-size:.76rem;font-weight:600;cursor:pointer;padding:0;text-decoration:underline;margin-top:-.15rem}
  .store-block{border-top:1px dashed var(--line);padding-top:.55rem;margin-top:.15rem}
  .store-name{font-size:.85rem;font-weight:700;margin-bottom:.35rem;display:flex;align-items:center;gap:.4rem;flex-wrap:wrap}
  .store-name a{color:var(--olive-deep);text-decoration:none;border-bottom:1px solid currentColor}
  .store-name a:hover{opacity:.8}
  .store-thumb{width:26px;height:26px;border-radius:6px;object-fit:cover;cursor:zoom-in;flex-shrink:0}
  .store-link{font-size:.76rem;font-weight:500;border-bottom:1px dashed currentColor}
  .offer-group{display:flex;align-items:center;gap:.5rem;margin-top:.35rem}
  .offer-group:first-of-type{margin-top:0}
  .offer-group .store-thumb{width:30px;height:30px}
  .offers{display:flex;flex-wrap:wrap;gap:.4rem}
  .offer-btn{position:relative;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);border-radius:10px;padding:.4rem .7rem;cursor:pointer;font-family:inherit;font-size:.82rem;text-align:center;transition:border-color .15s, background .15s, transform .1s}
  .offer-btn b{display:block;font-size:.9rem;color:var(--olive-deep)}
  .offer-btn:hover{border-color:var(--olive);background:color-mix(in srgb, var(--olive) 8%, var(--bg))}
  .offer-btn:active{transform:scale(.97)}
  .offer-btn:focus-visible{outline:3px solid var(--brass);outline-offset:2px}
  .offer-btn .prev-price{opacity:.55;text-decoration:line-through;font-size:.78em;margin-inline-end:.25em}
  .offer-btn .new-badge{position:absolute;top:-8px;inset-inline-end:-6px;background:var(--brass);color:#12140D;font-size:.6rem;font-weight:700;padding:.05rem .35rem;border-radius:6px;line-height:1.4}
  .offer-btn.sold{opacity:.5;cursor:not-allowed;filter:grayscale(.6)}
  .offer-btn.sold:hover{border-color:var(--line);background:var(--bg)}
  .offer-btn .sold-badge{position:absolute;top:-8px;inset-inline-end:-6px;background:var(--red);color:#fff;font-size:.6rem;font-weight:700;padding:.05rem .35rem;border-radius:6px;line-height:1.4}

  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:60;opacity:0;pointer-events:none;transition:opacity .2s}
  .overlay.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;bottom:0;inset-inline-start:0;width:min(420px,100%);background:var(--bg);z-index:70;transform:translateX(-100%);transition:transform .25s ease;display:flex;flex-direction:column;box-shadow:8px 0 30px rgba(0,0,0,.3)}
  [dir="rtl"] .drawer{transform:translateX(100%)}
  .drawer.open{transform:translateX(0)}
  .drawer-head{padding:1.1rem 1.2rem;background:var(--card);border-bottom:1px solid var(--line);color:var(--ink);display:flex;justify-content:space-between;align-items:center}
  .drawer-head h2{font-size:1.15rem}
  .drawer-head-actions{display:flex;align-items:center;gap:.9rem}
  .clear-cart-btn{background:none;border:none;color:var(--red);font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;padding:0;text-decoration:underline}
  .close-x{background:none;border:none;color:var(--ink);font-size:1.5rem;cursor:pointer;line-height:1}
  .drawer-body{flex:1;overflow-y:auto;padding:1rem 1.2rem;display:flex;flex-direction:column;gap:.6rem}
  .cart-store-head{display:flex;align-items:center;gap:.5rem;padding:.15rem .1rem .4rem;margin-top:.5rem;border-bottom:1.5px solid var(--line)}
  .cart-store-head:first-child{margin-top:0}
  .cart-store-name{flex:1;font-weight:700;font-size:.86rem;color:var(--olive-deep)}
  .cart-store-total{font-weight:700;font-size:.86rem}
  .cart-store-copy{background:none;border:1.5px solid var(--line);border-radius:999px;padding:.2rem .65rem;font-size:.7rem;font-weight:600;color:var(--ink);cursor:pointer;font-family:inherit;transition:border-color .15s}
  .cart-store-copy:hover{border-color:var(--olive)}
  .cart-store-clear{background:none;border:1.5px solid var(--line);border-radius:999px;padding:.2rem .65rem;font-size:.7rem;font-weight:600;color:var(--red);cursor:pointer;font-family:inherit;transition:border-color .15s}
  .cart-store-clear:hover{border-color:var(--red)}
  .cart-item{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:.7rem .9rem;display:flex;align-items:center;gap:.6rem}
  .cart-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--bg)}
  .cart-item .info{font-size:.86rem;flex:1;min-width:0}
  .cart-item .info b{display:block;font-size:.92rem}
  .cart-item .store{color:#8A8D7B;font-size:.76rem}
  .cart-tip{color:var(--olive-deep);font-size:.74rem;font-weight:600;margin-top:.25rem}
  .cart-disclaimer{color:#8A8D7B;font-size:.74rem;text-align:center;line-height:1.5}
  .qty{display:flex;align-items:center;gap:.45rem}
  .qty button{width:1.7rem;height:1.7rem;border-radius:8px;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);cursor:pointer;font-size:1rem}
  .remove{background:none;border:none;color:var(--red);cursor:pointer;font-size:.78rem;font-family:inherit;padding:0;margin-top:2px}
  .empty{color:#8A8D7B;text-align:center;margin-top:2rem;font-size:.95rem}
  .skel{height:340px;border-radius:var(--radius);background:linear-gradient(100deg, var(--card) 30%, var(--line) 50%, var(--card) 70%);background-size:200% 100%;animation:skel-shine 1.3s ease-in-out infinite}
  @keyframes skel-shine{from{background-position:200% 0}to{background-position:-200% 0}}
  @media (prefers-reduced-motion:reduce){.skel{animation:none}}
  .drawer-foot{border-top:1px solid var(--line);padding:1rem 1.2rem;background:var(--card);display:flex;flex-direction:column;gap:.7rem}
  .total-row{display:flex;justify-content:space-between;font-weight:700;font-size:1.05rem}
  .copy-msg{background:var(--olive);color:#12140D;border:none;border-radius:10px;padding:.7rem;font-family:inherit;font-weight:700;font-size:.98rem;cursor:pointer}
  .toast{position:fixed;bottom:1.4rem;inset-inline-start:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:.6rem 1.3rem;border-radius:999px;font-size:.88rem;opacity:0;transition:opacity .25s;z-index:90;pointer-events:none}
  [dir="rtl"] .toast{transform:translateX(50%)}
  .toast.show{opacity:1}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>

<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="shell">
  <aside class="sidebar" id="sidebar">
    <a class="wordmark" id="homeLink" href="#" aria-label="Back to top, clear filters">
      <h1 id="shopName">My list</h1>
      <small id="shopTag">decants • full bottles • leftovers, price-compared</small>
    </a>

    <label class="stock-toggle">
      <input type="checkbox" id="inStockOnly">
      <span id="inStockOnlyLabel"></span>
    </label>

    <details class="filter-section" open>

/* --- Smart search ---------------------------------------------------
   Goals: doesn't need an exact substring match (typo-tolerant), works
   regardless of whether the query is Arabic or English, matches on
   brand as well as name, and understands common niche-fragrance-
   community shorthand for both brands and specific lines. */

// strips Latin accents AND Arabic diacritics (tashkeel) via the same
// Unicode decomposition, so "Déclaration"/"declaration" and Arabic text
// with/without harakat both normalize to the same comparable form.
const normalizeText = s => (s||"").normalize("NFKD").replace(/[\u0300-\u036f\u064b-\u065f\u0670\u06d6-\u06ed]/g, "").toLowerCase();

// shortcut -> the full text it should also match; expanded onto the
// product's own searchable text (not the query) so typing either the
// shortcut or the full name finds the same products.
const SEARCH_ALIASES = {
  "ysl": "yves saint laurent", "mfk": "maison francis kurkdjian",
  "pdm": "parfums de marly", "tf": "tom ford", "jpg": "jean paul gaultier",
  "cdn": "club de nuit", "shl": "stephane humbert lucas",
  "dg": "dolce gabbana", "d&g": "dolce gabbana", "ea": "emporio armani",
  "mmk": "maison francis kurkdjian", "ck": "calvin klein",
  "ffm": "fragrance world", "fw": "fragrance world",
};

function buildSearchHaystack(p){
  let text = normalizeText([p.name_en, p.name_ar, p.brand, ...(p.dupe_of||[])].filter(Boolean).join(" "));
  for(const [short, full] of Object.entries(SEARCH_ALIASES)){
    if(text.includes(full)) text += " " + short;
  }
  return text;
}

// bounded edit distance — bails early once the two strings' lengths
// differ by more than the max allowed distance, since 939 products'
// worth of these run on every keystroke that doesn't exact-match.
function editDistanceWithin(a, b, max){
  if(Math.abs(a.length - b.length) > max) return false;
  const dp = [];
  for(let i=0;i<=a.length;i++) dp.push([i, ...Array(b.length).fill(0)]);
  for(let j=0;j<=b.length;j++) dp[0][j] = j;
  for(let i=1;i<=a.length;i++){
    for(let j=1;j<=b.length;j++){
      dp[i][j] = a[i-1]===b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
    }
  }
  return dp[a.length][b.length] <= max;
}

// exact substring first (cheap, catches the vast majority of searches);
// only falls back to fuzzy per-word comparison — allowing a 1-character
// typo for short-ish words and 2 for longer ones — when that fails, and
// only for tokens long enough that a fuzzy match means something.
function tokenMatchesHaystack(token, haystack){
  if(haystack.includes(token)) return true;
  if(token.length < 4) return false;
  const maxDist = token.length > 6 ? 2 : 1;
  return haystack.split(" ").some(w => w.length >= 3 && editDistanceWithin(token, w, maxDist));
}

function productMatchesQuery(p, qTokens){
  if(!qTokens.length) return true;
  if(!p._searchHaystack) p._searchHaystack = buildSearchHaystack(p);
  return qTokens.every(tok => tokenMatchesHaystack(tok, p._searchHaystack));
}
const slugify = s => (s||"").toLowerCase().replace(/[^a-z0-9]+/g,"-").replace(/^-|-$/g,"");
/* dupe_of entries are stored "Name — Brand" for display, but product ids are
   slugified from name_en alone (no brand suffix) — strip the "— Brand" part
   before slugifying so the cross-link lookup actually matches. */
const dupeSlug = s => slugify((s||"").split(/\s+—\s+/)[0]);
const pname = p => lang==="ar" ? (p.name_ar||p.name_en) : (p.name_en||p.name_ar);
/* The alt-name line under the title is only useful when it actually adds
   information — skip it if there's no Arabic/English name on file, or if
   the two are just the same text (nothing to translate/transliterate). */
const pname_alt = p => {
  const alt = lang==="ar" ? p.name_en : p.name_ar;
  if(!alt || alt.trim().toLowerCase() === pname(p).trim().toLowerCase()) return "";
  return alt;
};
const nlabel = n => lang==="ar" ? (n.label_ar||n.label_en) : (n.label_en||n.label_ar);

function offerLabel(o){
  const size = o.ml==="as-shown" ? t().as_shown : (lang==="ar" ? `${o.ml} مل` : `${o.ml}ml`);
  if(o.kind==="full") return `${size} "${t().full_tag}"`;
  if(o.kind==="leftover") return `${size} "${t().leftover_tag}"`;
  return size;
}

const NEW_BADGE_DAYS = 5;
// Paused on 2026-07-17 (large backfill made "New" fire on lots of old
// offers at once) — only offers first seen after this date show the badge.
// To fully re-enable, delete the o.first_seen <= NEW_BADGE_SINCE check below.
const NEW_BADGE_SINCE = "2026-07-17";
function isNewOffer(o){
  if(!o.first_seen || o.first_seen <= NEW_BADGE_SINCE) return false;
  // days can be slightly negative near a UTC day boundary (first_seen is a
  // local calendar date, parsed here as UTC midnight) — still "new" either way
  const days = (Date.now() - new Date(o.first_seen)) / 86400000;
  return days <= NEW_BADGE_DAYS;
}

function productHasKind(p, kind){
  return (p.stores||[]).some(s => (s.offers||[]).some(o => o.kind===kind));
}

function productHasStore(p, storeName){
  return (p.stores||[]).some(s => s.name===storeName);
}

// A product with every offer, at every store, sold out is a "false
// positive" in search/browse — it matches the query but there's nowhere
// to actually buy it right now. One available offer anywhere is enough
// to keep the product in view.
function productHasAvailableOffer(p){
  return (p.stores||[]).some(s => (s.offers||[]).some(o => !o.sold_since));
}

/* Kind/Store/Sort all render as clickable rows in the sidebar (rather than
   native <select>s) now that they live in a persistent panel instead of a
   toolbar dropdown — Brand stays a <select> since it can run to hundreds
   of entries, where a native picker's typeahead/scroll beats a bespoke list. */
function buildFilterRows(container, entries, activeValue, onPick){
  container.innerHTML = entries.map(e => `
    <button class="filter-row" type="button" data-value="${e.value}" aria-pressed="${String(e.value===activeValue)}">
      <span class="filter-row-label">${e.swatch ? '<span class="swatch"></span>' : ''}${e.label}</span>
      ${e.count!=null ? `<span class="count">${e.count}</span>` : ""}
    </button>`).join("");
  container.querySelectorAll(".filter-row").forEach(row => {
    row.addEventListener("click", () => onPick(row.dataset.value));
  });
}

function populateKindFilter(){
  const counts = { all: PRODUCTS.length, decant: 0, full: 0, leftover: 0 };
  PRODUCTS.forEach(p => {
    ["decant","full","leftover"].forEach(k => { if(productHasKind(p, k)) counts[k]++; });
  });
  const entries = [
    { value:"all", label:t().filter_all, count:counts.all, swatch:true },
    { value:"decant", label:t().filter_decant, count:counts.decant, swatch:true },
    { value:"full", label:t().filter_full, count:counts.full, swatch:true },
    { value:"leftover", label:t().filter_leftover, count:counts.leftover, swatch:true },
  ];
  buildFilterRows(document.getElementById("kindList"), entries, filter, value => {
    filter = value;
    populateKindFilter();
    updateFilterBadge();
    render();
    trackEvent("filter_kind", { value });
  });
}

function populateStoreFilter(){
  const counts = {};
  PRODUCTS.forEach(p => (p.stores||[]).forEach(s => { counts[s.name] = (counts[s.name]||0) + 1; }));
  const names = Object.keys(counts).sort();
  if(storeFilter!=="all" && !names.includes(storeFilter)) storeFilter = "all";
  const entries = [
    { value:"all", label:t().store_all },
    ...names.map(n => ({ value:n, label:n, count:counts[n] })),
  ];
  buildFilterRows(document.getElementById("storeList"), entries, storeFilter, value => {
    storeFilter = value;
    populateStoreFilter();
    updateFilterBadge();
    render();
    trackEvent("filter_store", { value });
  });
}

/* Brand values in the data aren't perfectly case-normalized (e.g. "French
   Avenue" vs "French avenue" from different sources) — group case/space
   -insensitively so the dropdown doesn't show the same brand twice, and
   display whichever exact casing is most common for that brand. */
function populateBrandFilter(){
  const variants = {};
  PRODUCTS.forEach(p => {
    const b = (p.brand||"").trim();
    if(!b) return;
    const key = b.toLowerCase();
    (variants[key] = variants[key] || {})[b] = (variants[key][b]||0) + 1;
  });
  const entries = Object.entries(variants).map(([key, counts]) => ({
    key,
    display: Object.entries(counts).sort((a,b)=>b[1]-a[1])[0][0],
  })).sort((a,b) => a.display.localeCompare(b.display));

  const sel = document.getElementById("brandFilter");
  const prev = sel.value || "all";
  sel.innerHTML = `<option value="all">${t().brand_all}</option>` +
    entries.map(e => `<option value="${e.key}">${e.display}</option>`).join("");
  sel.value = entries.some(e=>e.key===prev) ? prev : "all";
  brandFilter = sel.value;
}

function populateSortOrder(){
  const entries = [
    { value:"newest", label:t().sort_newest },
    { value:"oldest", label:t().sort_oldest },
    { value:"cheapest", label:t().sort_cheapest },
    { value:"default", label:t().sort_default },
  ];
  buildFilterRows(document.getElementById("sortList"), entries, sortOrder, value => {
    sortOrder = value;
    populateSortOrder();
    updateFilterBadge();
    render();
    trackEvent("filter_sort", { value });
  });
}

function productCheapestPrice(p){
  let min = Infinity;
  (p.stores||[]).forEach(s => (s.offers||[]).forEach(o => { if(o.price < min) min = o.price; }));
  return min;
}

function productNewestDate(p){
  let latest = "";
  (p.stores||[]).forEach(s => (s.offers||[]).forEach(o => { if(o.first_seen && o.first_seen > latest) latest = o.first_seen; }));
  return latest;
}

async function load(){
  try{
    const res = await fetch("products.json?v=" + Date.now());
    const data = await res.json();
    SETTINGS = data.settings || {};
    PRODUCTS = data.products || [];
    applyI18n();
    render();
    syncCart(); // re-resolve any cart restored from localStorage now that PRODUCTS is populated
    // a shared link (#product-id) should land directly on that card, same
    // as clicking a dupe_of/duped_by jump — reuse that logic so it also
    // gets the "extend rendered window to include it" handling for free
    const sharedId = location.hash.slice(1);
    if(sharedId && PRODUCTS.some(p => p.id === sharedId)) focusProduct(sharedId);
  }catch(e){
    grid.innerHTML = `<p class="empty">${t().load_failed}</p>`;
  }
}

function applyI18n(){
  document.documentElement.lang = lang;
  document.documentElement.dir = lang === "ar" ? "rtl" : "ltr";
  document.getElementById("shopName").textContent = lang==="ar" ? (SETTINGS.site_name_ar||t().site_name) : (SETTINGS.site_name_en||t().site_name);
  document.getElementById("shopTag").textContent = t().tag;
  document.getElementById("search").placeholder = t().search_ph;
  document.getElementById("cartLabel").textContent = t().cart_label;
  document.getElementById("drawerTitle").textContent = t().drawer_title;
  document.getElementById("totalLabel").textContent = t().total;
  document.getElementById("copyMsg").textContent = t().copy_btn;
  document.getElementById("clearCart").textContent = t().clear_all_btn;
  document.getElementById("toggleLang").textContent = t().toggle_lang;
  document.getElementById("toggleTheme").textContent = theme==="dark" ? t().theme_to_light : t().theme_to_dark;
  document.getElementById("disclaimer").textContent = t().disclaimer;
  document.getElementById("cartDisclaimer").textContent = t().disclaimer;
  document.getElementById("siteFooter").innerHTML = t().footer_note;
  document.getElementById("kindLabel").textContent = t().label_kind;
  document.getElementById("inStockOnlyLabel").textContent = t().in_stock_only;
  document.getElementById("storeFilterLabel").textContent = t().label_store;
  document.getElementById("brandFilterLabel").textContent = t().label_brand;
  document.getElementById("sortOrderLabel").textContent = t().label_sort;
  document.getElementById("viewLabel").textContent = t().label_view;
  document.getElementById("viewAutoBtn").textContent = t().view_auto;
  document.getElementById("filtersToggleLabel").textContent = t().filters_label;
  populateKindFilter();
  populateStoreFilter();
  populateBrandFilter();
  populateSortOrder();
  updateFilterBadge();
}

function computeItems(){
  const qTokens = normalizeText(query).split(/\s+/).filter(Boolean);
  const items = PRODUCTS.filter(p =>
    (filter==="all" || productHasKind(p, filter)) &&
    (storeFilter==="all" || productHasStore(p, storeFilter)) &&
    (brandFilter==="all" || (p.brand||"").trim().toLowerCase()===brandFilter) &&
    (!inStockOnly || productHasAvailableOffer(p)) &&
    productMatchesQuery(p, qTokens)
  );
  if(sortOrder==="newest") items.sort((a,b) => productNewestDate(b).localeCompare(productNewestDate(a)));
  else if(sortOrder==="oldest") items.sort((a,b) => productNewestDate(a).localeCompare(productNewestDate(b)));
  else if(sortOrder==="cheapest") items.sort((a,b) => productCheapestPrice(a) - productCheapestPrice(b));
  return items;
}

function storeCheapestPrice(s){
  let min = Infinity;
  (s.offers||[]).forEach(o => { if(o.price < min) min = o.price; });
  return min;
}

function buildCardEl(p, byId){
  const dupeMatches = (p.dupe_of||[]).map(name => ({ name, match: byId[dupeSlug(name)] || null }));
  const dupedBy = PRODUCTS.filter(o => o.id!==p.id && (o.dupe_of||[]).some(d => dupeSlug(d)===p.id));

  // With more stores added over time a card listing every one in full got
  // unreadably long — show only the cheapest store's offers by default
  // (the one most people actually care about), with the rest one toggle
  // away instead of always taking up the full card height.
  const sortedStores = (p.stores||[]).map((s, si) => ({ s, si }))
    .sort((a,b) => storeCheapestPrice(a.s) - storeCheapestPrice(b.s));

  const card = document.createElement("article");
  card.className = "card";
  card.id = "card-" + p.id;
  card.innerHTML = `
    <div class="card-img">
      ${p.image ? `<img src="${p.image}" alt="${pname(p)}" loading="lazy" data-pid="${p.id}">` : "🧴"}
      <button class="card-share" data-share="${p.id}" aria-label="${t().share_link}" title="${t().share_link}">🔗</button>
    </div>
    <div class="card-body">
      ${p.brand ? `<button class="card-brand" data-brand-jump="${p.brand}">${p.brand}</button>` : ""}
      <h3>${pname(p)}</h3>
      ${pname_alt(p) ? `<div class="name-alt">${pname_alt(p)}</div>` : ""}
      ${dupeMatches.length ? `<div class="dupe-of">${t().dupe_of}: ${dupeMatches.map(d => d.match ? `<button data-jump="${d.match.id}">${d.name}</button>` : d.name).join(", ")}</div>` : ""}
      ${dupedBy.length ? `<div class="duped-by">${t().duped_by}: ${dupedBy.map(o => `<button data-jump="${o.id}">${pname(o)}</button>`).join(", ")}</div>` : ""}
      ${p.accords && p.accords.length ? `
        <div class="accords" id="accords-${p.id}">${p.accords.map(a=>`<div class="accord" style="background:${a.color};width:${a.w}%">${nlabel(a)}</div>`).join("")}</div>
        ${p.accords.length>5 ? `<button class="accords-toggle" data-target="accords-${p.id}" data-more="${p.accords.length-5}">${t().show_more_notes.replace("{n}", p.accords.length-5)}</button>` : ""}
      ` : ""}
      <div class="stores-list" id="stores-${p.id}">
        ${sortedStores.map(({s,si})=>{
          // Offers with their own photo (e.g. a full-bottle listing) get their
          // own thumb+group instead of sharing the store's general one — a
          // single store.image can't represent both a decant vial and a
          // sealed full bottle.
          const groups = [];
          const byImage = new Map();
          (s.offers||[]).forEach((o,oi) => {
            const img = o.image || s.image || "";
            if (!byImage.has(img)) { byImage.set(img, []); groups.push(img); }
            byImage.get(img).push(oi);
          });
          return `
          <div class="store-block">
            <div class="store-name">
              ${s.url ? `<a href="${s.url}" target="_blank" rel="noopener" data-store-click="${s.name}" data-pid="${p.id}">${s.name}</a>` : s.name}
              ${s.product_url ? `<a class="store-link" href="${s.product_url}" target="_blank" rel="noopener" data-listing-click="${s.name}" data-pid="${p.id}">🔗 ${t().view_listing}</a>` : ""}
            </div>
            ${groups.map(img => `
              <div class="offer-group">
                ${img ? `<img class="store-thumb" src="${img}" alt="${s.name}" loading="lazy" data-pid="${p.id}">` : ""}
                <div class="offers">
                  ${byImage.get(img).map(oi => { const o = s.offers[oi]; return `
                    <button class="offer-btn${o.sold_since ? " sold" : ""}" data-pid="${p.id}" data-si="${si}" data-oi="${oi}"${o.sold_since ? ` disabled aria-disabled="true"` : ""}>
                      ${o.sold_since ? `<span class="sold-badge">${t().sold_badge}</span>` : isNewOffer(o) ? `<span class="new-badge">${t().new_badge}</span>` : ""}
                      ${offerLabel(o)} <b>${o.prev_price ? `<span class="prev-price">${o.prev_price}</span>` : ""}${o.price}</b>
                    </button>`; }).join("")}
                </div>
              </div>`).join("")}
          </div>`;
        }).join("")}
      </div>
      ${sortedStores.length>1 ? `<button class="stores-toggle" data-target="stores-${p.id}" data-more="${sortedStores.length-1}">${t().show_more_stores.replace("{n}", sortedStores.length-1)}</button>` : ""}
    </div>`;
  return card;
}

function appendCards(items){
  const byId = Object.fromEntries(PRODUCTS.map(p=>[p.id,p]));
  items.forEach(p => grid.appendChild(buildCardEl(p, byId)));
}

function updateLoadSentinel(){
  document.getElementById("loadSentinel").hidden = renderedCount >= currentItems.length;
}

function renderItems(items, count){
  currentItems = items;
  renderedCount = Math.min(count, items.length);
  grid.innerHTML = items.length ? "" : `<p class="empty">${t().no_results}</p>`;
  appendCards(items.slice(0, renderedCount));
  updateLoadSentinel();
}

function loadMore(){
  if(renderedCount >= currentItems.length) return;
  const next = currentItems.slice(renderedCount, renderedCount + PAGE_SIZE);
  appendCards(next);
  renderedCount += next.length;
  updateLoadSentinel();
}

function render(){
  renderItems(computeItems(), PAGE_SIZE);
}

function filterByBrand(brand){
  resetFilters();
  brandFilter = brand.trim().toLowerCase();
  document.getElementById("brandFilter").value = brandFilter;
  updateFilterBadge();
  render();
  window.scrollTo({top: 0, behavior: "smooth"});
}

grid.addEventListener("click", async e => {
  const img = e.target.closest(".card-img img, .store-thumb");
  if (img){ openLightbox(img.src, img.alt); trackEvent("product_image_view", { item_id: img.dataset.pid || "" }); return; }
  const shareBtn = e.target.closest("[data-share]");
  if (shareBtn){
    const url = `${location.origin}${location.pathname}#${shareBtn.dataset.share}`;
    trackEvent("share_link_click", { item_id: shareBtn.dataset.share });
    try{
      await navigator.clipboard.writeText(url);
      toast(t().link_copied);
    }catch{
      toast(t().copy_failed);
    }
    return;
  }
  const listingBtn = e.target.closest("[data-listing-click]");
  if (listingBtn){ trackEvent("store_listing_click", { store: listingBtn.dataset.listingClick, item_id: listingBtn.dataset.pid || "" }); }
  const storeBtn = e.target.closest("[data-store-click]");
  if (storeBtn && !listingBtn){ trackEvent("store_home_click", { store: storeBtn.dataset.storeClick, item_id: storeBtn.dataset.pid || "" }); }
  const brandBtn = e.target.closest("[data-brand-jump]");
  if (brandBtn){ trackEvent("brand_jump_click", { brand: brandBtn.dataset.brandJump }); filterByBrand(brandBtn.dataset.brandJump); return; }
  const jumpBtn = e.target.closest("[data-jump]");
  if (jumpBtn){ trackEvent("dupe_jump_click", { item_id: jumpBtn.dataset.jump }); focusProduct(jumpBtn.dataset.jump); return; }
  const accordsToggle = e.target.closest(".accords-toggle");
  if (accordsToggle){
    const target = document.getElementById(accordsToggle.dataset.target);
    const expanded = target.classList.toggle("expanded");
    accordsToggle.textContent = expanded ? t().show_less_notes : t().show_more_notes.replace("{n}", accordsToggle.dataset.more);
    if (expanded) trackEvent("accords_expand_click", { item_id: accordsToggle.dataset.target });
    return;
  }
  const storesToggle = e.target.closest(".stores-toggle");
  if (storesToggle){
    const target = document.getElementById(storesToggle.dataset.target);
    const expanded = target.classList.toggle("expanded");
    storesToggle.textContent = expanded ? t().show_less_stores : t().show_more_stores.replace("{n}", storesToggle.dataset.more);
    if (expanded) trackEvent("stores_expand_click", { item_id: storesToggle.dataset.target });
    return;
  }
  const offerBtn = e.target.closest(".offer-btn");
  if (offerBtn){
    addToCart(offerBtn.dataset.pid, +offerBtn.dataset.si, +offerBtn.dataset.oi);
  }
});

const lightbox = document.getElementById("lightbox");
const lightboxImg = document.getElementById("lightboxImg");
function openLightbox(src, alt){
  lightboxImg.src = src;
  lightboxImg.alt = alt || "";
  lightbox.classList.add("open");
}
function closeLightbox(){
  lightbox.classList.remove("open");
  lightboxImg.src = "";
}
lightbox.addEventListener("click", e => { if(e.target === lightbox) closeLightbox(); });
document.getElementById("lightboxClose").addEventListener("click", closeLightbox);
document.addEventListener("keydown", e => { if(e.key === "Escape") closeLightbox(); });

function resetFilters(){
  filter = "all"; query = ""; storeFilter = "all"; brandFilter = "all"; inStockOnly = false;
  document.getElementById("search").value = "";
  document.getElementById("brandFilter").value = "all";
  document.getElementById("inStockOnly").checked = false;
  populateKindFilter();
  populateStoreFilter();
  updateFilterBadge();
}

function focusProduct(id){
  resetFilters();
  // a dupe_of/duped_by jump target can sit far past the first page under
  // the current sort order — extend how much is rendered up front so its
  // card actually exists in the DOM to scroll to, instead of only being
  // reachable by scrolling/load-more first.
  const items = computeItems();
  const idx = items.findIndex(p => p.id === id);
  renderItems(items, idx >= 0 ? idx + 1 : PAGE_SIZE);
  requestAnimationFrame(()=>{
    const el = document.getElementById("card-"+id);
    if(el){
      el.scrollIntoView({behavior:"smooth", block:"center"});
      el.classList.add("flash");
      setTimeout(()=>el.classList.remove("flash"), 1500);
    }
  });
}

document.getElementById("homeLink").addEventListener("click", e=>{
  e.preventDefault();
  resetFilters();
  render();
  window.scrollTo({top: 0, behavior: "smooth"});
  trackEvent("reset_filters", { source: "home_link" });
});

let searchGaDebounce;
document.getElementById("search").addEventListener("input", e=>{
  query=e.target.value;
  render();
  clearTimeout(searchGaDebounce);
  searchGaDebounce = setTimeout(()=>{
    if(query.trim()) trackEvent("search", { search_term: query.trim() });
  }, 800);
});
document.getElementById("brandFilter").addEventListener("change", e=>{ brandFilter=e.target.value; updateFilterBadge(); render(); trackEvent("filter_brand", { value: brandFilter }); });

function applyGridCols(){
  if(gridCols === "auto") grid.removeAttribute("data-cols");
  else grid.setAttribute("data-cols", gridCols);
  document.querySelectorAll(".view-btn").forEach(b => b.setAttribute("aria-pressed", String(b.dataset.cols===gridCols)));
}
document.querySelectorAll(".view-btn").forEach(b => b.addEventListener("click", ()=>{
  gridCols = b.dataset.cols;
  localStorage.setItem("gridCols", gridCols);
  applyGridCols();
  updateFilterBadge();
  trackEvent("grid_view_change", { cols: gridCols });

applyGridCols();

/* The sidebar (all filters) is persistent on wide screens; on narrow ones
   it becomes a slide-in panel toggled by this button — same drawer
   pattern as the cart. The badge shows how many filters are set away from
   their default, so it's obvious at a glance whether it's worth opening. */
const sidebar = document.getElementById("sidebar");
const sidebarOverlay = document.getElementById("sidebarOverlay");
const filtersToggle = document.getElementById("filtersToggle");
const closeSidebar = ()=>{
  sidebar.classList.remove("open");
  sidebarOverlay.classList.remove("open");
  filtersToggle.setAttribute("aria-expanded", "false");
};
filtersToggle.onclick = ()=>{
  const open = sidebar.classList.toggle("open");
  sidebarOverlay.classList.toggle("open", open);
  filtersToggle.setAttribute("aria-expanded", String(open));
  if(open) trackEvent("filters_panel_open", {});
};
sidebarOverlay.onclick = closeSidebar;
function updateFilterBadge(){
  const n = [filter!=="all", storeFilter!=="all", brandFilter!=="all", sortOrder!=="newest", gridCols!=="auto", inStockOnly].filter(Boolean).length;
  const badge = document.getElementById("filterBadge");
  badge.textContent = n;
  badge.hidden = n === 0;
  document.getElementById("brandFilterClear").hidden = brandFilter==="all";
}
document.getElementById("inStockOnly").addEventListener("change", e => {
  inStockOnly = e.target.checked;
  updateFilterBadge();
  render();
  trackEvent("filter_in_stock_only", { enabled: inStockOnly });
});
document.getElementById("brandFilterClear").onclick = ()=>{
  brandFilter = "all";
  document.getElementById("brandFilter").value = "all";
  updateFilterBadge();
  render();
  trackEvent("filter_brand_clear", {});
};

document.getElementById("toggleLang").onclick = ()=>{
  lang = lang === "en" ? "ar" : "en";
  localStorage.setItem("lang", lang);
  applyI18n();
  render();
  syncCart();
  trackEvent("language_toggle", { language: lang });
};
document.getElementById("toggleTheme").onclick = ()=>{
  theme = theme === "dark" ? "light" : "dark";
  localStorage.setItem("theme", theme);
  document.documentElement.setAttribute("data-theme", theme);
  document.getElementById("toggleTheme").textContent = theme==="dark" ? t().theme_to_light : t().theme_to_dark;
  trackEvent("theme_toggle", { theme });
};

const drawer = document.getElementById("drawer");
const overlay = document.getElementById("overlay");
const cartBody = document.getElementById("cartBody");

function addToCart(productId, storeIdx, offerIdx){
  const key = `${productId}|${storeIdx}|${offerIdx}`;
  const existing = cart.find(c=>c.key===key);
  if (existing) existing.qty++;
  else cart.push({key, productId, storeIdx, offerIdx, qty:1});
  toast(t().added);
  syncCart();

  const p = PRODUCTS.find(x=>x.id===productId);
  const s = p && (p.stores||[])[storeIdx];
  const o = s && (s.offers||[])[offerIdx];
  if(p && s && o){
    trackEvent("add_to_cart", {
      currency: "EGP",
      value: o.price,
      items: [{ item_id: p.id, item_name: p.name_en || p.id, item_brand: p.brand || "", item_variant: `${s.name} / ${offerLabel(o)}`, price: o.price, quantity: 1 }],
    });
  }
}

/* Simple "best value" check: among all this product's offers of the same
   kind (decant/full/leftover) across every store, is there one with a
   lower price-per-ml? "as-shown" offers have no known quantity so they're
   excluded from the comparison — there's no fair per-ml basis for them. */
const offerPerMl = o => o.price / o.ml;
function findBestDeal(product, kind, ml){
  if(ml === "as-shown" || !ml) return null;
  let best = null;
  (product.stores||[]).forEach(s => {
    (s.offers||[]).forEach(o => {
      if(o.kind !== kind) return;
      if(kind === "leftover"){
        // a leftover's ml is whatever happened to remain in an opened
        // bottle, not a chosen size — different stores' leftovers are
        // essentially never going to match exactly, so compare by
        // price-per-ml across ALL leftover offers instead of requiring
        // the same ml (unlike decants/full bottles, where a bigger size
        // being cheaper per ml is normal and not what this should flag).
        if(o.ml === "as-shown" || !o.ml) return;
      } else if(o.ml !== ml){
        return;
      }
      if(!best || offerPerMl(o) < offerPerMl(best.offer)) best = { store: s, offer: o };
    });
  });
  return best;
}

function resolveCartLine(c){
  const p = PRODUCTS.find(x=>x.id===c.productId);
  if(!p) return null;
  const s = (p.stores||[])[c.storeIdx];
  if(!s) return null;
  const o = (s.offers||[])[c.offerIdx];
  if(!o) return null;
  return { p, s, o };
}

/* Groups the flat `cart` array by store name, preserving each entry's real
   index into `cart` (needed for the inc/dec/remove buttons' data-* attrs,
   which operate on the flat array regardless of how it's displayed). */
function groupCartByStore(){
  const groups = [];
  const byKey = {};
  cart.forEach((c,i) => {
    const line = resolveCartLine(c);
    if(!line) return;
    const key = (line.s.name||"").trim().toLowerCase() || "_";
    if(!byKey[key]){ byKey[key] = { name: line.s.name, entries: [] }; groups.push(byKey[key]); }
    byKey[key].entries.push({ c, i, line });
  });
  return groups;
}

function syncCart(){
  // drop entries that no longer resolve (e.g. a catalog sync removed/reordered
  // a store's offers) so a stale localStorage cart never shows a count that
  // doesn't match what's actually displayed
  if(PRODUCTS.length) cart = cart.filter(c => resolveCartLine(c) !== null);
  saveCart();
  document.getElementById("cartCount").textContent = cart.reduce((a,c)=>a+c.qty,0);
  cartBody.innerHTML = "";
  const groups = groupCartByStore();
  if(!groups.length){
    cartBody.innerHTML = `<p class="empty">${t().empty}</p>`;
  }
  groups.forEach(g => {
    const storeTotal = g.entries.reduce((a,{c,line})=>a + line.o.price*c.qty, 0);
    if(groups.length > 1){
      const head = document.createElement("div");
      head.className = "cart-store-head";
      head.innerHTML = `
        <bdi class="cart-store-name">${g.name}</bdi>
        <span class="cart-store-total">${storeTotal}</span>
        <button class="cart-store-copy" data-store="${g.name}">${t().copy_store_btn}</button>
        <button class="cart-store-clear" data-clear-store="${g.name}">${t().clear_store_btn}</button>`;
      cartBody.appendChild(head);
    }
    g.entries.forEach(({c,i,line}) => {
      const { p, s, o } = line;
      let tip = "";
      const best = findBestDeal(p, o.kind, o.ml);
      const isBetter = best && (o.kind === "leftover" ? offerPerMl(best.offer) < offerPerMl(o) : best.offer.price < o.price);
      if(isBetter){
        // the store name is always Latin-script (English seller names), so in
        // an Arabic (RTL) line it needs a bidi isolate around it — otherwise
        // the browser's bidi algorithm can pull neighboring dashes/numbers
        // out of their intended order. "من" ("from") also reads naturally in
        // Arabic where English just uses the store name directly.
        tip = `<div class="cart-tip">💡 ${t().better_deal} ${t().from_store}<bdi>${best.store.name}</bdi> - ${offerLabel(best.offer)} - ${best.offer.price}</div>`;
      }
      const row = document.createElement("div");
      row.className = "cart-item";
      row.innerHTML = `
        ${p.image ? `<img class="cart-thumb" src="${p.image}" alt="">` : ""}
        <div class="info">
          <b>${pname(p)}</b>
          ${offerLabel(o)} × ${o.price}
          <div class="store">${s.name}</div>
          ${tip}
          <button class="remove" data-rm="${i}">${t().remove}</button>
        </div>
        <div class="qty">
          <button data-dec="${i}" aria-label="decrease">−</button>
          <span>${c.qty}</span>
          <button data-inc="${i}" aria-label="increase">+</button>
        </div>`;
      cartBody.appendChild(row);
    });
  });
  document.getElementById("total").textContent = cart.reduce((a,c)=>{
    const line = resolveCartLine(c);
    return a + (line ? line.o.price*c.qty : 0);
  }, 0);
}

cartBody.addEventListener("click", async e=>{
  const inc=e.target.dataset.inc, dec=e.target.dataset.dec, rm=e.target.dataset.rm;
  if(inc!=null || dec!=null || rm!=null){
    if(inc!=null){ cart[inc].qty++; trackEvent("cart_qty_increase", { item_id: cart[inc].productId }); }
    if(dec!=null){ const pid=cart[dec].productId; cart[dec].qty--; if(cart[dec].qty<1) cart.splice(dec,1); trackEvent("cart_qty_decrease", { item_id: pid }); }
    if(rm!=null){ trackEvent("remove_from_cart", { item_id: cart[rm].productId }); cart.splice(rm,1); }
    syncCart();
    return;
  }
  const storeCopyBtn = e.target.closest(".cart-store-copy");
  if(storeCopyBtn){
    trackEvent("copy_store_message", { store: storeCopyBtn.dataset.store });
    try{
      await navigator.clipboard.writeText(buildMessage(storeCopyBtn.dataset.store));
      toast(t().copied);
    }catch{
      toast(t().copy_failed);
    }
    return;
  }
  const storeClearBtn = e.target.closest(".cart-store-clear");
  if(storeClearBtn){
    const target = storeClearBtn.dataset.clearStore;
    trackEvent("cart_store_clear", { store: target });
    cart = cart.filter(c => {
      const line = resolveCartLine(c);
      return line ? line.s.name !== target : true;
    });
    syncCart();
    toast(t().cleared);
  }
});

document.getElementById("openCart").onclick = ()=>{ drawer.classList.add("open"); overlay.classList.add("open"); trackEvent("view_cart", { item_count: cart.length }); };
const closeDrawer = ()=>{ drawer.classList.remove("open"); overlay.classList.remove("open"); };
document.getElementById("closeCart").onclick = closeDrawer;
overlay.onclick = closeDrawer;

document.getElementById("clearCart").onclick = ()=>{
  if(!cart.length) return;
  trackEvent("cart_clear_all", { item_count: cart.length });
  cart = [];
  syncCart();
  toast(t().cleared);
};

/* With no filter, the full cart grouped by store (grand total appended).
   With filterStoreName, just that one store's lines (no grand total —
   it'd be identical to that store's own subtotal). */
function buildMessage(filterStoreName){
  const groups = groupCartByStore().filter(g => !filterStoreName || g.name === filterStoreName);

  let msg = "";
  let grand = 0;
  groups.forEach(g=>{
    const total = g.entries.reduce((a,{c,line})=>a + line.o.price*c.qty, 0);
    const lines = g.entries.map(({c,line}) => {
      const { p, o } = line;
      const lineTotal = o.price * c.qty;
      const qtyTag = c.qty > 1 ? ` × ${c.qty}` : "";
      return `${pname(p)} - ${offerLabel(o)}${qtyTag} - ${lineTotal}`;
    });
    msg += `${g.name}:\n${lines.join("\n")}\n${g.name} ${t().store_total}: ${total}\n\n`;
    grand += total;
  });
  if(!filterStoreName) msg += `${t().total}: ${grand}`;
  return msg.trim();
}

document.getElementById("copyMsg").onclick = async ()=>{
  if(!cart.length){ toast(t().empty); return; }
  trackEvent("begin_checkout", { currency: "EGP", item_count: cart.length });
  try{
    await navigator.clipboard.writeText(buildMessage());
    toast(t().copied);
  }catch{
    toast(t().copy_failed);
  }
};

let toastTimer;
function toast(txt){
  const el = document.getElementById("toast");
  el.textContent = txt;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove("show"), 2200);
}

// fires loadMore() a bit before the sentinel actually enters the
// viewport (rootMargin) so the next page is ready before the user hits
// the bottom, rather than a visible pause-then-append.
new IntersectionObserver(entries => {
  if(entries[0].isIntersecting) loadMore();
}, { rootMargin: "600px" }).observe(document.getElementById("loadSentinel"));

load();
syncCart();
</script>
</body>
</html>
